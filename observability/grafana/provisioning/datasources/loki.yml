apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"?trace_id"?\s*[:=]\s*"?(\w{16,32})"?'
          name: TraceID
          url: "$${__value.raw}"
