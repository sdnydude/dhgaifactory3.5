global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'dhg-ai-factory'
    environment: 'local'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['dhg-alertmanager:9093']

# Load alert rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Registry API service
  - job_name: 'registry-api'
    static_configs:
      - targets: ['registry-api:8000']
        labels:
          service: 'registry-api'
    metrics_path: '/metrics'
    scrape_interval: 10s


  # PostgreSQL metrics via postgres-exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'registry-db'
    scrape_interval: 30s

  # Node Exporter (host metrics) — uses host network, reachable via dhg-network gateway
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['172.18.0.1:9100']
        labels:
          service: 'node-exporter'
    scrape_interval: 15s

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
    scrape_interval: 15s

  # VS Engine (Verbalized Sampling)
  - job_name: 'vs-engine'
    static_configs:
      - targets: ['dhg-vs-engine:8000']
        labels:
          service: 'vs-engine'
    metrics_path: /metrics
    scrape_interval: 15s

  # medkb RAG-as-a-Service
  - job_name: 'medkb'
    static_configs:
      - targets: ['dhg-medkb-api:8015']
    metrics_path: /metrics
    scrape_interval: 15s

  # Docker Service Discovery — auto-discovers containers with
  # prometheus.io/scrape=true label. Add these Docker labels to any
  # service to opt in:
  #   labels:
  #     prometheus.io/scrape: "true"
  #     prometheus.io/port: "8000"
  #     prometheus.io/path: "/metrics"
  - job_name: 'docker-sd'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: label
            values: ["prometheus.io/scrape=true"]
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_io_scrape]
        regex: "true"
        action: keep
      - source_labels: [__meta_docker_network_ip, __meta_docker_container_label_prometheus_io_port]
        separator: ':'
        target_label: __address__
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      - source_labels: [__meta_docker_container_label_prometheus_io_path]
        target_label: __metrics_path__
        regex: (.+)
