groups:
  - name: dhg-infrastructure
    rules:
      # T1: Container unhealthy > 10 min — not directly available via Prometheus
      #     (Docker healthcheck status is not exported by cAdvisor)

      # T2: Container crash loop (>3 restarts in 15 min)
      - alert: ContainerCrashLoop
        expr: increase(container_restart_count{name=~"dhg-.*"}[15m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} restarted >3 times in 15 min"

      # T3: Host memory > 90%
      - alert: HostMemoryHigh
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory above 90% ({{ $value | humanizePercentage }})"

      # T4: Host swap > 80%
      - alert: HostSwapHigh
        expr: (1 - node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes) > 0.8 and node_memory_SwapTotal_bytes > 0
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Host swap above 80% ({{ $value | humanizePercentage }})"

      # T5: Root disk > 85%
      - alert: RootDiskHigh
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) > 0.85
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Root disk above 85% ({{ $value | humanizePercentage }})"

      # T6: Data disk > 80%
      - alert: DataDiskHigh
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/mnt/4tb"} / node_filesystem_size_bytes{mountpoint="/mnt/4tb"}) > 0.8
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "Data disk /mnt/4tb above 80% ({{ $value | humanizePercentage }})"

      # T8: Prometheus scrape target DOWN
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"

      # T8 special case: Registry API (critical)
      - alert: RegistryApiDown
        expr: up{job="registry-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Registry API is down"

      # T9: DB connection pool > 80% of max_connections
      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "PostgreSQL connections above 80 ({{ $value }})"

      # T12: Zombie processes > 50
      - alert: ZombieProcessesHigh
        expr: node_processes_zombies > 50
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "{{ $value }} zombie processes on host"

      # T13: Container memory > 16GB (no limit set)
      - alert: ContainerMemoryLeak
        expr: container_memory_usage_bytes{name=~"dhg-.*"} > 17179869184 and container_spec_memory_limit_bytes{name=~"dhg-.*"} == 0
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Container {{ $labels.name }} using >16GB with no memory limit"

      # General: Container high CPU (warning, informational)
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"dhg-.*"}[5m]) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} CPU > 90% for 10m"

      # General: Container high memory vs limit (warning, informational)
      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes{name=~"dhg-.*"} / container_spec_memory_limit_bytes{name=~"dhg-.*"}) > 0.9 and container_spec_memory_limit_bytes{name=~"dhg-.*"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory > 90% of limit"
