# Dhgaifactory3.5 Workflow Refactor Shared Constants Or Rules Across Agents

## Action

Follow the refactor-shared-constants-or-rules-across-agents workflow:
1. Create new shared file(s) (e.g., src/prompts/<name>.py)
2. Move constants or logic from each agent module to the shared file(s)
