# Dhgaifactory3.5 Workflow Add New Capture Module Or Feature To Registry

## Action

Follow the add-new-capture-module-or-feature-to-registry workflow:
1. Create or update endpoint file(s) for the new feature (e.g., <feature>_endpoints.py)
2. Create or update schema file(s) (e.g., <feature>_schemas.py)
3. Create or update service file(s) (e.g., <feature>_service.py)
4. Update registry/models.py to add new models or fields
5. Add or update migration file(s) (e.g., alembic/versions/ or migrations/NNN_<desc>.sql/py)
6. Update registry/api.py to register new routes or routers
7. Write or update tests for the new feature (e.g., test_<feature>.py)
8. Optionally update write_auth.py if the feature involves write protection

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: registry/<feature>_endpoints.py, registry/<feature>_schemas.py, registry/<feature>_service.py

