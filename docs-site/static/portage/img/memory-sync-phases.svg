<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="sh2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="650" fill="#FAFAF9" rx="8"/>

  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">/sync-memory — Phase Architecture</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#666">Full mode (6 phases) vs Light mode (2 phases) — what runs when</text>

  <!-- Legend -->
  <rect x="40" y="80" width="16" height="16" rx="3" fill="#2D5A27"/>
  <text x="62" y="93" font-size="11" fill="#333">Both modes</text>
  <rect x="160" y="80" width="16" height="16" rx="3" fill="#3B5998"/>
  <text x="182" y="93" font-size="11" fill="#333">Full mode only</text>
  <rect x="300" y="80" width="16" height="16" rx="3" fill="#C4722A"/>
  <text x="322" y="93" font-size="11" fill="#333">Both (partial in light)</text>
  <rect x="480" y="80" width="16" height="16" rx="3" fill="#ccc" stroke="#999"/>
  <text x="502" y="93" font-size="11" fill="#333">Skipped in light mode</text>

  <!-- ====== PHASE 1 ====== -->
  <rect x="40" y="115" width="170" height="110" rx="10" fill="#E0E8F5" stroke="#3B5998" stroke-width="2" filter="url(#sh2)"/>
  <text x="125" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#3B5998">Phase 1</text>
  <text x="125" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#3B5998">CodeGraph</text>
  <line x1="60" y1="168" x2="190" y2="168" stroke="#3B5998" stroke-width="0.5"/>
  <text x="125" y="185" text-anchor="middle" font-size="10" fill="#555">codegraph sync</text>
  <text x="125" y="200" text-anchor="middle" font-size="9" fill="#888">Full mode only</text>
  <text x="125" y="215" text-anchor="middle" font-size="9" fill="#888">~50ms per changed file</text>

  <line x1="210" y1="170" x2="240" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ====== PHASE 2 ====== -->
  <rect x="245" y="115" width="200" height="220" rx="10" fill="#E8F5E3" stroke="#2D5A27" stroke-width="2" filter="url(#sh2)"/>
  <text x="345" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#2D5A27">Phase 2</text>
  <text x="345" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#2D5A27">Journal Consolidation</text>
  <line x1="260" y1="168" x2="430" y2="168" stroke="#2D5A27" stroke-width="0.5"/>

  <!-- Steps in both modes -->
  <rect x="260" y="178" width="170" height="18" rx="3" fill="#2D5A27" opacity="0.15"/>
  <text x="268" y="192" font-size="10" fill="#2D5A27">1. now.md → today-*.md</text>
  <rect x="260" y="200" width="170" height="18" rx="3" fill="#2D5A27" opacity="0.15"/>
  <text x="268" y="214" font-size="10" fill="#2D5A27">2. Clear now.md</text>
  <rect x="260" y="222" width="170" height="18" rx="3" fill="#2D5A27" opacity="0.15"/>
  <text x="268" y="236" font-size="10" fill="#2D5A27">3. Age 7d → recent.md</text>
  <rect x="260" y="244" width="170" height="18" rx="3" fill="#2D5A27" opacity="0.15"/>
  <text x="268" y="258" font-size="10" fill="#2D5A27">4. Age 14d → archive.md</text>

  <!-- Steps in full mode only -->
  <rect x="260" y="270" width="170" height="18" rx="3" fill="#3B5998" opacity="0.15"/>
  <text x="268" y="284" font-size="10" fill="#3B5998">5. Git backfill (14d)</text>
  <rect x="260" y="292" width="170" height="18" rx="3" fill="#3B5998" opacity="0.15"/>
  <text x="268" y="306" font-size="10" fill="#3B5998">6. Clean *.done.md (30d)</text>

  <text x="345" y="328" text-anchor="middle" font-size="9" fill="#888">Steps 1-4: both modes</text>

  <line x1="445" y1="170" x2="475" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ====== PHASE 3 ====== -->
  <rect x="480" y="115" width="490" height="360" rx="10" fill="#F5F0FF" stroke="#5B4B8A" stroke-width="2" filter="url(#sh2)"/>
  <text x="725" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#5B4B8A">Phase 3</text>
  <text x="725" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#5B4B8A">Auto-Memory — Audit &amp; Update</text>
  <line x1="495" y1="168" x2="955" y2="168" stroke="#5B4B8A" stroke-width="0.5"/>

  <!-- 3a -->
  <rect x="500" y="180" width="220" height="75" rx="6" fill="#fff" stroke="#3B5998" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="520" y="200" font-size="11" font-weight="700" fill="#3B5998">3a: Staleness Audit</text>
  <text x="520" y="216" font-size="9" fill="#555">Check project/decision/feedback/ref</text>
  <text x="520" y="230" font-size="9" fill="#555">memories against current codebase</text>
  <text x="520" y="244" font-size="9" fill="#555">+ contradiction detection</text>

  <!-- 3b -->
  <rect x="740" y="180" width="220" height="75" rx="6" fill="#fff" stroke="#3B5998" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="760" y="200" font-size="11" font-weight="700" fill="#3B5998">3b: Missing Memories</text>
  <text x="760" y="216" font-size="9" fill="#555">Check conversation + git log</text>
  <text x="760" y="230" font-size="9" fill="#555">for uncaptured feedback,</text>
  <text x="760" y="244" font-size="9" fill="#555">milestones, references</text>

  <!-- 3c -->
  <rect x="500" y="268" width="220" height="85" rx="6" fill="#fff" stroke="#3B5998" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="520" y="288" font-size="11" font-weight="700" fill="#3B5998">3c: Pattern Detection</text>
  <text x="520" y="304" font-size="9" fill="#555">Hot areas (3+/7 sessions)</text>
  <text x="520" y="318" font-size="9" fill="#555">Workflow distribution by domain</text>
  <text x="520" y="332" font-size="9" fill="#555">Trend comparison (4-run avg)</text>
  <text x="520" y="346" font-size="9" fill="#555">Unfinished branch detection</text>

  <!-- 3d -->
  <rect x="740" y="268" width="220" height="85" rx="6" fill="#fff" stroke="#3B5998" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="760" y="288" font-size="11" font-weight="700" fill="#3B5998">3d: Memory Pruning</text>
  <text x="760" y="304" font-size="9" fill="#555">Archive stale → memory_archive.md</text>
  <text x="760" y="318" font-size="9" fill="#555">Delete original file</text>
  <text x="760" y="332" font-size="9" fill="#C0392B" font-weight="600">Safety: max 3/run, 7d min age</text>
  <text x="760" y="346" font-size="9" fill="#555">Behavioral feedback exempt</text>

  <!-- 3e -->
  <rect x="500" y="366" width="220" height="60" rx="6" fill="#fff" stroke="#3B5998" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="520" y="386" font-size="11" font-weight="700" fill="#3B5998">3e: Rebuild Index</text>
  <text x="520" y="402" font-size="9" fill="#555">Regenerate MEMORY.md from disk</text>
  <text x="520" y="416" font-size="9" fill="#555">Rebuild decisions_index.md</text>

  <!-- 3f -->
  <rect x="740" y="366" width="220" height="60" rx="6" fill="#fff" stroke="#C4722A" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="760" y="386" font-size="11" font-weight="700" fill="#C4722A">3f: Registry Metrics POST</text>
  <text x="760" y="402" font-size="9" fill="#555">POST health/patterns to :8011</text>
  <text x="760" y="416" font-size="9" fill="#C4722A" font-weight="600">Both modes (null fields in light)</text>

  <!-- Arrows between sub-phases -->
  <line x1="720" y1="218" x2="735" y2="218" stroke="#555" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="610" y1="255" x2="610" y2="263" stroke="#555" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="720" y1="310" x2="735" y2="310" stroke="#555" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="610" y1="353" x2="610" y2="361" stroke="#555" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="720" y1="396" x2="735" y2="396" stroke="#555" stroke-width="1" marker-end="url(#ar)"/>

  <!-- ====== PHASE 4 ====== -->
  <rect x="40" y="370" width="170" height="100" rx="10" fill="#E0E8F5" stroke="#3B5998" stroke-width="2" filter="url(#sh2)"/>
  <text x="125" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#3B5998">Phase 4</text>
  <text x="125" y="413" text-anchor="middle" font-size="11" font-weight="600" fill="#3B5998">Serena Memories</text>
  <line x1="55" y1="423" x2="195" y2="423" stroke="#3B5998" stroke-width="0.5"/>
  <text x="125" y="440" text-anchor="middle" font-size="10" fill="#555">Verify 6 semantic mems</text>
  <text x="125" y="455" text-anchor="middle" font-size="10" fill="#555">TS language server check</text>
  <text x="125" y="468" text-anchor="middle" font-size="9" fill="#888">Full mode only</text>

  <!-- ====== PHASE 5 ====== -->
  <rect x="245" y="370" width="200" height="100" rx="10" fill="#E0E8F5" stroke="#3B5998" stroke-width="2" filter="url(#sh2)"/>
  <text x="345" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#3B5998">Phase 5</text>
  <text x="345" y="413" text-anchor="middle" font-size="11" font-weight="600" fill="#3B5998">CLAUDE.md Currency</text>
  <line x1="260" y1="423" x2="430" y2="423" stroke="#3B5998" stroke-width="0.5"/>
  <text x="345" y="440" text-anchor="middle" font-size="10" fill="#555">Table count vs schema.ts</text>
  <text x="345" y="455" text-anchor="middle" font-size="10" fill="#555">Progress vs TODO.md</text>
  <text x="345" y="468" text-anchor="middle" font-size="9" fill="#888">Full mode only</text>

  <!-- ====== PHASE 6 ====== -->
  <rect x="40" y="500" width="930" height="120" rx="10" fill="#F0F7EE" stroke="#2D5A27" stroke-width="2" filter="url(#sh2)"/>
  <text x="505" y="530" text-anchor="middle" font-size="14" font-weight="700" fill="#2D5A27">Phase 6: Report</text>
  <line x1="55" y1="540" x2="955" y2="540" stroke="#2D5A27" stroke-width="0.5"/>

  <text x="70" y="560" font-size="11" fill="#333" font-weight="600">Output:</text>
  <text x="70" y="578" font-size="10" fill="#555">12-row summary table (CodeGraph | Journal | Backfill | Cleanup | Auto-memory | Contradictions | Patterns | Unfinished | Pruning | Metrics | Serena | CLAUDE.md)</text>
  <text x="70" y="596" font-size="10" fill="#555">Lists memories added/updated/removed + contradiction details + writes .last-full-sync timestamp</text>

  <!-- Trigger labels -->
  <rect x="1000" y="115" width="170" height="75" rx="8" fill="#fff" stroke="#555" stroke-width="1" filter="url(#sh2)"/>
  <text x="1085" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Triggers</text>
  <line x1="1010" y1="145" x2="1160" y2="145" stroke="#ccc"/>
  <text x="1020" y="163" font-size="10" fill="#2D5A27" font-weight="600">Full:</text>
  <text x="1060" y="163" font-size="10" fill="#555">6am cron, manual</text>
  <text x="1020" y="180" font-size="10" fill="#C4722A" font-weight="600">Light:</text>
  <text x="1060" y="180" font-size="10" fill="#555">session exit hook</text>

  <rect x="1000" y="210" width="170" height="75" rx="8" fill="#fff" stroke="#555" stroke-width="1" filter="url(#sh2)"/>
  <text x="1085" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Cost</text>
  <line x1="1010" y1="240" x2="1160" y2="240" stroke="#ccc"/>
  <text x="1020" y="258" font-size="10" fill="#2D5A27" font-weight="600">Full:</text>
  <text x="1060" y="258" font-size="10" fill="#555">~30 turns, 5-10 min</text>
  <text x="1020" y="275" font-size="10" fill="#C4722A" font-weight="600">Light:</text>
  <text x="1060" y="275" font-size="10" fill="#555">removed (was broken)</text>

</svg>
