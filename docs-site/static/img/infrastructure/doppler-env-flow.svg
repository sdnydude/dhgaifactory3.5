<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" font-family="sans-serif" role="img" aria-label="The .env file is generated one-directionally from Doppler: Doppler source of truth, doppler secrets download, .env local cache, then docker compose or npm run dev">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e3a5f"/>
    </marker>
  </defs>

  <!-- Doppler source of truth -->
  <rect x="60" y="24" width="300" height="62" rx="8" fill="#bfdbfe" stroke="#1e3a5f" stroke-width="2"/>
  <text x="210" y="50" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Doppler</text>
  <text x="210" y="70" text-anchor="middle" font-size="12" fill="#475569">source of truth</text>

  <!-- arrow + label -->
  <line x1="210" y1="86" x2="210" y2="146" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="120" y="100" width="180" height="26" rx="13" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="210" y="118" text-anchor="middle" font-size="12" font-family="monospace" fill="#1e293b">doppler secrets download</text>

  <!-- .env -->
  <rect x="60" y="150" width="300" height="62" rx="8" fill="#dbeafe" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="210" y="176" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">.env</text>
  <text x="210" y="196" text-anchor="middle" font-size="12" fill="#475569">local cache, auto-generated</text>

  <!-- arrow -->
  <line x1="210" y1="212" x2="210" y2="262" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- consumer -->
  <rect x="60" y="266" width="300" height="62" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="1.5"/>
  <text x="210" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">docker compose</text>
  <text x="210" y="312" text-anchor="middle" font-size="13" fill="#1e293b">npm run dev</text>

  <!-- caption -->
  <text x="210" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">One-directional &#8595;&#160;&#160; .env is generated FROM Doppler</text>
  <text x="210" y="384" text-anchor="middle" font-size="11" fill="#475569">Edits to .env are lost on the next session</text>
</svg>
