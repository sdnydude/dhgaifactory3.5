# Talkback is public until the Cloudflare Access gate lands — rate-limit it so
# visitors can't burn GPU/LLM tokens. 6 req/min per client IP, small burst.
limit_req_zone $binary_remote_addr zone=talkback:10m rate=6r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Talkback assistant — streamed (SSE), rate-limited, proxied to the registry
    # over the internal Docker network.
    location = /api/talkback {
        limit_req zone=talkback burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://dhg-registry-api:8000/api/talkback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # Other homepage APIs (status LEDs) — proxied, not rate-limited.
    location /api/ {
        proxy_pass http://dhg-registry-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
