services:
  session-logger:
    build:
      context: services/session-logger
      dockerfile: Dockerfile
    container_name: dhg-session-logger
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dhg}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-dhg_registry}
      - POSTGRES_HOST=registry-db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_URL=http://172.17.0.1:11434
      - SUMMARIZE_MODEL=${SUMMARIZE_MODEL:-qwen3:14b}
    ports:
      - "8009:8009"
    depends_on:
      registry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8009"
      prometheus.io/path: "/metrics"
    networks:
      - dhg-network
    restart: unless-stopped

  dhg-logo-maker:
    build: ./services/logo-maker
    container_name: dhg-logo-maker
    ports:
      - "8012:8012"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - /mnt/4tb/dhg-storage/logo-maker:/mnt/4tb/dhg-storage/logo-maker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  registry-api:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: dhg-registry-api
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
      prometheus.io/path: "/metrics"
    ports:
      - "8011:8000"
    environment:
      - POSTGRES_USER=dhg
      - POSTGRES_PASSWORD=weenie64
      - POSTGRES_DB=dhg_registry
      - POSTGRES_HOST=registry-db
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://dhg:weenie64@registry-db:5432/dhg_registry
      - LANGGRAPH_API_URL=${LANGGRAPH_API_URL:-https://dhg-agents-526554f2bb905517adab9bd53427c745.us.langgraph.app}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - EXPORT_SIGNING_SECRET=${EXPORT_SIGNING_SECRET}
      - PDF_RENDERER_URL=http://dhg-pdf-renderer:8014
      - FRONTEND_INTERNAL_URL=http://dhg-frontend:3000
      - EXPORTS_DIR=/exports
    volumes:
      - dhg_exports:/exports:ro
    depends_on:
      registry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: dhg-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-remote-write-receiver'
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: dhg-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: dhg-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: dhg-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: dhg-node-exporter
    pid: host
    network_mode: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: dhg-cadvisor
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - dhg-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dhg-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://dhg:weenie64@registry-db:5432/dhg_registry?sslmode=disable
    depends_on:
      registry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dhg-network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: dhg-promtail
    volumes:
      - ./observability/promtail:/etc/promtail
      - /mnt/4tb/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9080'"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped

  dhg-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LANGGRAPH_API_URL: /api/langgraph
        NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID: needs_assessment
        NEXT_PUBLIC_REGISTRY_API_URL: http://10.0.0.251:8011
        NEXT_PUBLIC_SECURITY_DEV_MODE: "true"
    container_name: dhg-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://0.0.0.0:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped
    labels:
      - "prometheus.io/scrape=false"

  tempo:
    image: grafana/tempo:2.3.1
    container_name: dhg-tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo:/etc/tempo
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped

  vs-engine:
    build:
      context: ./services/vs-engine
      dockerfile: Dockerfile
    container_name: dhg-vs-engine
    environment:
      - OLLAMA_BASE_URL=http://dhg-ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8013:8000"
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
      prometheus.io/path: "/metrics"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dhg-network
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  tempo_data:
